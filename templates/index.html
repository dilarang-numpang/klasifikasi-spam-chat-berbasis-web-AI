<!DOCTYPE html>
<html>
<head>
    <title>Klasifikasi Spam</title>
</head>
<body>
    <h2>Sistem Klasifikasi Pesan Spam</h2>

    <form method="POST">
        <textarea name="text" placeholder="Masukkan teks pesan..." required></textarea>
        <br><br>
        <button type="submit">Prediksi</button>
    </form>

    {% if result %}
        <h3>Hasil: {{ result }}</h3>
    {% endif %}
</body>
</html>
